services:
  mysql:
    image: mysql:8.0
    container_name: image-style-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-mysql_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-image_style_conversion}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3305:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: image-style-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: image-style-backend
    restart: unless-stopped
    ports:
      - "2800:8000"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-your_dashscope_api_key_here}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mysql_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-image_style_conversion}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_for_jwt_here}
      TOKEN_EXPIRE_MINUTES: 1440
      UPLOAD_DIR: /app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: image-style-frontend
    restart: unless-stopped
    ports:
      - "2500:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  upload_data:
